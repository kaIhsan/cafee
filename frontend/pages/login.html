<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - Premium Cafe</title>
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        body class="login-body" {
            /* Jika ingin diatur via CSS internal, gunakan selector berikut: */
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h2 {
            color: #1e293b;
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            font-weight: 800;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.95rem;
            margin: 0;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 105rem;
            color: #1e293b;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        /* Fitur tambahan: Remember Me & Forgot Password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #475569;
            cursor: pointer;
        }

        .remember-me input {
            cursor: pointer;
        }

        .forgot-link {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Button Styling */
        .btn-primary {
            width: 100%;
            background-color: #0ea5e9;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary:hover {
            background-color: #0284c7;
        }

        .btn-primary:active {
            transform: scale(0.99);
        }

        .login-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .login-footer a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: bold;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="login-body">

    <main class="login-card">
        <div class="login-header">
            <h2>Premium Cafe</h2>
            <p>Masuk untuk menikmati penawaran eksklusif</p>
        </div>

        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">Email atau Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan email atau username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Ingat Saya
                </label>
                <a href="/forgot-password" class="forgot-link">Lupa Kata Sandi?</a>
            </div>

            <button type="submit" class="btn-primary">Masuk Sekarang</button>
        </form>

        <div class="login-footer">
            <p>Belum memiliki akun? <a href="/register">Daftar di sini</a></p>
        </div>
    </main>

</body>
</html>
