<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Galaxy Cafe</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">
    <main class="login-card">
        <div class="login-header">
            <imgalt="Galaxy Cafeshop Logo" class="logo">
            <h2>Galaxy Cafe</h2>
            <p>Welcome to Galaxy Cafe Website</p>
        </div>
<script src="../js/login.js"></script>
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">Email atau Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan email atau username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Ingat Saya
                </label>
                <a class="forgot-link">Lupa Kata Sandi?</a>
            </div>

            <button type="submit" class="btn-primary">Masuk Sekarang</button>
        </form>

    </main>

</body>
</html>
