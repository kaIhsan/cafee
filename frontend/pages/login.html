<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - Premium Cafe</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-header">
            <h2>Premium Cafe</h2>
            <p>Masuk untuk menikmati penawaran eksklusif</p>
        </div>

        <form action="dashboard.html" method="GET">
            <div class="input-group">
                <label for="username">Email atau Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan email Anda" required>
            </div>
            
            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required>
            </div>

            <button type="submit" class="btn-primary">Masuk Sekarang</button>
        </form>

        <div class="login-footer">
            <p>Belum memiliki akun? <a href="#">Daftar di sini</a></p>
        </div>
    </div>

</body>
</html>
