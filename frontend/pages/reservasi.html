<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Galaxy Cafe - Reservasi</title>
<link rel="stylesheet" href="../css/reservasi.css">
</head>

<body>
<div class="back-btn">
    <a href="../pages/dashboard.html" class="back">← Kembali</a>
</div>
<div class="container">
<div class="box">
<CENTER>
<h1>Reservasi Galaxy Cafe</h1>
</CENTER>
<form id="formReservasi">

<!-- DATA -->
<h3>👤 Data Pelanggan</h3>

<input type="text" id="nama" placeholder="Nama" required>
<input type="email" id="email" placeholder="Email" required>
<input type="tel" id="telp" placeholder="No HP" required>

<input type="date" id="tanggal" required>
<input type="time" id="jam" required>
<input type="number" id="jumlah" placeholder="Jumlah Orang" min="1" required>

<textarea id="catatan" placeholder="Catatan"></textarea>
<br><br>
<h3> Pre-Order Menu</h3>
<div class="tab-menu">
    <button type="button" class="tab active" onclick="showTab('makanan')">🍽️ Makanan</button>
    <button type="button" class="tab" onclick="showTab('minuman')">☕ Minuman</button>
</div>

<!-- hanya 1 tampil -->
<div id="makanan" class="tab-content active"></div>
<div id="minuman" class="tab-content"></div>
<!-- CART -->
<h3>🛒 Keranjang</h3>
<div id="cart"></div>

<div class="total">
Total: <span id="total">Rp 0</span>
</div>

<button type="submit">Checkout & Reservasi</button>

</form>
<br>
<div class="info">Info: Untuk Meja Nanti Kami Siapkan Sesuai Ketentuan Jumlah Orang</div>
</div>
</div>

<script src="../js/reservasi.js"></script>

</body>
</html>
